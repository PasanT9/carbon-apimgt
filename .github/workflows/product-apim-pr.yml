name: API-M Product PR
on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  bump-product-apim:
    runs-on: ubuntu-latest

    steps:
      - name: Derive version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          
          if [[ ! "$VERSION" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "Invalid version derived from tag: $VERSION"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Using VERSION=$VERSION"

      - name: Checkout product-apim
        uses: actions/checkout@v3
        with:
          repository: pasant9/product-apim
          ref: refs/heads/master
          fetch-depth: '10'
          token: ${{ secrets.PRODUCT_APIM_PUSH_TOKEN }}
          path: product-apim

      - name: Update carbon.apimgt.version in product-apim
        shell: bash
        run: |
          set -euo pipefail
      
          FILES=(
            "api-control-plane/pom.xml"
            "gateway/pom.xml"
            "traffic-manager/pom.xml"
            "all-in-one-apim/pom.xml"
          )
      
          for REL in "${FILES[@]}"; do
            FILE="product-apim/${REL}"
      
            if [[ ! -f "$FILE" ]]; then
              echo "ERROR: File not found: $FILE"
              exit 1
            fi
      
            if ! grep -q "<carbon.apimgt.version>" "$FILE"; then
              echo "ERROR: <carbon.apimgt.version> not found in $FILE"
              exit 1
            fi
      
            sed -i "s#<carbon\.apimgt\.version>[^<]*</carbon\.apimgt\.version>#<carbon.apimgt.version>${VERSION}</carbon.apimgt.version>#g" "$FILE"
            echo "Updated: $FILE"
          done
      
          echo "Diff:"
          git -C product-apim diff -- "${FILES[@]}"

      - name: Create Pull Request in product-apim
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PRODUCT_APIM_PUSH_TOKEN }}
          path: product-apim
          base: master
          branch: chore/bump-carbon-apimgt-${{ env.VERSION }}
          commit-message: "Bump carbon-apimgt to ${{ env.VERSION }}"
          title: "Bump carbon-apimgt to ${{ env.VERSION }}"
          body: |
            Automated PR created from carbon-apimgt tag `${{ env.VERSION }}`.
            Updates `all-in-one-apim/pom.xml` to use the new carbon-apimgt version.
